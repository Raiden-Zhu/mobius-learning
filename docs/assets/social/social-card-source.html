<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Möbius Learning social card</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #1D1F23; }
    .card { position: relative; width: 1200px; height: 630px; overflow: hidden; background: #F6F7F8; }
    .card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; filter: saturate(.8) contrast(.92); }
    .veil { position: absolute; inset: 0; background: rgba(246, 247, 248, .68); }
    .content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 58px 70px; }
    .eyebrow { margin: 0 0 24px; font-size: 18px; font-weight: 700; text-transform: uppercase; }
    h1 { margin: 0; max-width: 780px; font: 700 78px/1.02 Georgia, "Times New Roman", serif; }
    .subtitle { margin: 18px 0 0; max-width: 760px; font: 600 34px/1.2 Georgia, "Times New Roman", serif; }
    .author { margin: 34px 0 0; font-size: 21px; font-weight: 650; }
    .url { position: absolute; left: 70px; bottom: 46px; margin: 0; color: #245E94; font-size: 18px; font-weight: 700; }
  </style>
</head>
<body>
  <main class="card">
    <img src="../figures/web/cyclic-depth-folding-metaphor-1536.webp" alt="">
    <div class="veil"></div>
    <div class="content">
      <p class="eyebrow">Version 1 · Preliminary Technical Report</p>
      <h1>Möbius Learning</h1>
      <p class="subtitle">Cyclic Depth Folding in Transformers</p>
      <p class="author">Tongtian Zhu · Zhejiang University</p>
      <p class="url">raiden-zhu.github.io/mobius-learning</p>
    </div>
  </main>
</body>
</html>
